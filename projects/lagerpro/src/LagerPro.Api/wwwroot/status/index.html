<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LagerPro Status</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 32px; max-width: 900px; }
    .card { border: 1px solid #ddd; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
    h1 { margin-bottom: 6px; }
    .meta { color: #666; font-size: 14px; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>LagerPro Status</h1>
  <div class="meta">Automatisk oppdatert fra appens status-endepunkt.</div>
  <div id="content">Laster...</div>
  <script>
    async function load() {
      const res = await fetch('/api/status');
      const data = await res.json();
      document.getElementById('content').innerHTML = `
        <div class="card"><strong>Prosjekt:</strong> ${data.project}</div>
        <div class="card"><strong>Fokus nå:</strong> ${data.currentFocus}</div>
        <div class="card"><strong>Dagens prioritet:</strong> ${data.todayPriority}</div>
        <div class="card"><strong>Teknisk fokus:</strong> ${data.technicalFocus}</div>
        <div class="card"><strong>Risiko:</strong> ${data.risks}</div>
        <div class="card"><strong>Neste steg:</strong> ${data.nextStep}</div>
        <div class="card"><strong>Sist oppdatert:</strong> ${data.lastUpdatedUtc}</div>
      `;
    }
    load();
  </script>
</body>
</html>
